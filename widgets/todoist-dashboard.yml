# Todoist Dashboard Widget for Dynacat
#
# Single consolidated widget showing karma, productivity stats, priority
# breakdown, project overview with task counts, streaks, and a link to
# the Todoist app.
#
# REQUIRED: Add to your Dynacat .env file:
#   TODOIST_API_TOKEN=your_personal_api_token_here
#
# HOW TO GET YOUR API TOKEN:
#   Todoist → Settings → Integrations → Developer → copy "API token"
#
# ─────────────────────────────────────────────────────────────────────────────

- type: custom-api
  title: Todoist
  cache: 15m
  url: https://api.todoist.com/api/v1/user
  headers:
    Authorization: Bearer ${TODOIST_API_TOKEN}
  subrequests:
    tasks:
      url: https://api.todoist.com/api/v1/tasks
      headers:
        Authorization: Bearer ${TODOIST_API_TOKEN}
    projects:
      url: https://api.todoist.com/api/v1/projects
      headers:
        Authorization: Bearer ${TODOIST_API_TOKEN}
  template: |
    {{ $tasks    := (.Subrequest "tasks").JSON.Array "." }}
    {{ $projects := (.Subrequest "projects").JSON.Array "results" }}

    {{/* ── Priority counts ──────────────────────────────────────── */}}
    {{ $p4 := 0 }}{{ $p3 := 0 }}{{ $p2 := 0 }}{{ $p1 := 0 }}
    {{ range $tasks }}
      {{ $p := .Int "priority" }}
      {{ if eq $p 4 }}{{ $p4 = add $p4 1 }}
      {{ else if eq $p 3 }}{{ $p3 = add $p3 1 }}
      {{ else if eq $p 2 }}{{ $p2 = add $p2 1 }}
      {{ else }}{{ $p1 = add $p1 1 }}
      {{ end }}
    {{ end }}

    <div style="display:flex;flex-direction:column;gap:10px">

      {{/* ── Karma ────────────────────────────────────────────────── */}}
      {{ if .JSON.Exists "karma" }}
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="size-h4">Karma</span>
        <span>
          <span class="color-highlight size-h3" style="font-weight:600">{{ .JSON.Int "karma" }}</span>
          {{ if .JSON.Exists "karma_trend" }}
            {{ $trend := .JSON.String "karma_trend" }}
            {{ if eq $trend "up" }}<span class="color-positive size-h4">&nbsp;&#9650;</span>
            {{ else if eq $trend "down" }}<span class="color-negative size-h4">&nbsp;&#9660;</span>
            {{ end }}
          {{ end }}
        </span>
      </div>
      {{ end }}

      {{/* ── Tasks completed today ────────────────────────────────── */}}
      {{ if .JSON.Exists "completed_today" }}
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="size-h4">Completed today</span>
        <span class="color-positive size-h3" style="font-weight:600">{{ .JSON.Int "completed_today" }}
          {{ if .JSON.Exists "daily_goal" }}<span class="color-subdue size-h4">/ {{ .JSON.Int "daily_goal" }}</span>{{ end }}
        </span>
      </div>
      {{ end }}

      {{/* ── All-time completed ───────────────────────────────────── */}}
      {{ if .JSON.Exists "completed_count" }}
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="size-h4">All-time completed</span>
        <span class="color-primary size-h4">{{ .JSON.Int "completed_count" }}</span>
      </div>
      {{ else if .JSON.Exists "karma_completed_count" }}
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="size-h4">All-time completed</span>
        <span class="color-primary size-h4">{{ .JSON.Int "karma_completed_count" }}</span>
      </div>
      {{ end }}

      {{/* ── Streaks — try all known field names ─────────────────── */}}
      {{ if .JSON.Exists "streak_days" }}
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="size-h4">Current streak</span>
        <span class="color-highlight size-h4">{{ .JSON.Int "streak_days" }} days &#128293;</span>
      </div>
      {{ else if .JSON.Exists "current_streak_days" }}
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="size-h4">Current streak</span>
        <span class="color-highlight size-h4">{{ .JSON.Int "current_streak_days" }} days &#128293;</span>
      </div>
      {{ else if .JSON.Exists "goals.current_streak" }}
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="size-h4">Current streak</span>
        <span class="color-highlight size-h4">{{ .JSON.Int "goals.current_streak" }} days &#128293;</span>
      </div>
      {{ end }}

      {{ if .JSON.Exists "longest_streak" }}
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="size-h4">Best streak</span>
        <span class="color-primary size-h4">{{ .JSON.Int "longest_streak" }} days</span>
      </div>
      {{ else if .JSON.Exists "longest_streak_days" }}
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="size-h4">Best streak</span>
        <span class="color-primary size-h4">{{ .JSON.Int "longest_streak_days" }} days</span>
      </div>
      {{ else if .JSON.Exists "goals.longest_streak" }}
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="size-h4">Best streak</span>
        <span class="color-primary size-h4">{{ .JSON.Int "goals.longest_streak" }} days</span>
      </div>
      {{ end }}

      {{ if .JSON.Exists "average_daily_completed" }}
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="size-h4">Avg tasks/day</span>
        <span class="color-primary size-h4">{{ .JSON.String "average_daily_completed" }}</span>
      </div>
      {{ end }}

      {{/* ── Open tasks + priority breakdown ─────────────────────── */}}
      {{ if gt (len $tasks) 0 }}
      <div style="padding-top:8px;border-top:1px solid rgba(128,128,128,0.15)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span class="size-h4">Open tasks</span>
          <span class="color-primary size-h4" style="font-weight:600">{{ len $tasks }}</span>
        </div>
        <div style="display:flex;gap:14px">
          <span title="Urgent">&#9679;&nbsp;<span class="color-negative size-h4">{{ $p4 }}</span></span>
          <span title="High">&#9679;&nbsp;<span class="color-highlight size-h4">{{ $p3 }}</span></span>
          <span title="Medium">&#9679;&nbsp;<span class="color-primary size-h4">{{ $p2 }}</span></span>
          <span title="Normal">&#9675;&nbsp;<span class="color-subdue size-h4">{{ $p1 }}</span></span>
        </div>
      </div>
      {{ end }}

      {{/* ── Projects with open task counts ──────────────────────── */}}
      {{ if gt (len $projects) 0 }}
      <div style="padding-top:8px;border-top:1px solid rgba(128,128,128,0.15)">
        <span class="size-h5">Projects ({{ len $projects }})</span>

        {{/* DEBUG: int-based comparison values — remove once counts work */}}
        {{ if gt (len $tasks) 0 }}
        <div class="color-subdue size-h6" style="margin-top:3px;opacity:0.5">
          dbg t[0]: project_id(str)="{{ (index $tasks 0).String "project_id" }}" project_id(int)={{ (index $tasks 0).Int "project_id" }} | p[0] id(str)="{{ (index $projects 0).String "id" }}" id(int)={{ (index $projects 0).Int "id" }}
        </div>
        {{ end }}

        <div style="display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:6px">
          {{ range $projects }}
          {{ $pidInt := .Int "id" }}
          {{ $pidStr := .String "id" }}
          {{ $count := 0 }}
          {{ range $tasks }}
            {{ if eq (.Int "project_id") $pidInt }}{{ $count = add $count 1 }}{{ end }}
          {{ end }}
          <span class="size-h4">{{ .String "name" }}&nbsp;<span class="color-subdue size-h5">({{ $count }})</span></span>
          {{ end }}
        </div>
      </div>
      {{ end }}

      {{/* ── Link to Todoist app ──────────────────────────────────── */}}
      <div style="padding-top:8px;border-top:1px solid rgba(128,128,128,0.15);display:flex;justify-content:flex-end">
        <a href="https://app.todoist.com" class="color-primary size-h4" target="_blank">Open Todoist -&gt;</a>
      </div>

    </div>
